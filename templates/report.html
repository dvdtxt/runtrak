<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 Informe 💡</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#"> runtrak 🏃‍♂️💨 </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('input') }}"> Introducir nuevos datos 📝</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('table') }}"> Historial 👀 </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('report') }}"> Informe 💡 </a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <h3 class="mt-5">Distancia x tiempo:</h3>
        <img src="{{ url_for('dist_over_time_png') }}" alt="Graph" class="img-fluid">
        <h3 class="mt-5">Duracion x tiempo:</h3>
        <img src="{{ url_for('dura_over_time_png') }}" alt="Graph" class="img-fluid">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Minutos en total</h5>
                        <p class="card-text">{{ minutes }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Distancia recorrida</h5>
                        <p class="card-text">{{ distances }} Km</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
